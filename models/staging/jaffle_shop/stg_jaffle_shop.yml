version: 2

models: 
  - name: stg_jaffle_shop__customers
    description: The grain of this table is one unique customer per row
    columns:
      - name: customer_id
        description: Primary key for the customers table
        data_tests:
          - not_null
          - unique

  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for Orders table
        data_tests:
          - not_null
          - unique
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed','shipped','placed','returned','return_pending']
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
              
                  
