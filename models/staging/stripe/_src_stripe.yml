sources:
  - name: stripe
    database: raw
    schema: stripe
    tables:
      - name: payment

models:
  - name: stg_stripe__payment
    description: payments recorded by stripe for customer orders.
    columns:
      - name: payment_id
        description: unique identifier for a payment.
      - name: order_id
        description: identifier for the order associated with the payment.
      - name: payment_method
        description: method used to submit the payment.
      - name: payment_status
        description: current status of the payment.
      - name: payment_amount
        description: amount charged in the payment.
      - name: payment_created
        description: timestamp when the payment was created.
      - name: _batched_at
        description: timestamp when the record was loaded into the raw stripe batch.
