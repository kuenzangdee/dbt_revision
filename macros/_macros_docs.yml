version: 2
macros:
  - name: cents_to_dollars
    description: "Converts cents to dollars by dividing by 100"
    arguments:
      - name: column_name
        type: string
        description: "The column name containing the amount in cents"
      - name: decimals
        type: integer
        description: The decimal point defaults to 2

  - name: grant_select
    description: "A macro that Grants select on target.schema to target.role unless specified "
    arguments:
      - name: schema
        type: string
        description: schema we want to grant privs, by default it is our target.schema
      - name: role
        type: string
        description: Role we want to grant privs, by default it is our target.role